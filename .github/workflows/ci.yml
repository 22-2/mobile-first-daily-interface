name: Unit Tests

permissions:
  contents: read
  packages: read

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests
    runs-on: ${{ matrix.os }}
    env:
      # Mental model: private @22-2 packages are resolved by npmrc auth + NODE_AUTH_TOKEN.
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Mental model: setup-node's pnpm cache lookup requires pnpm to already exist on PATH.
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"
          scope: "@22-2"
          registry-url: "https://npm.pkg.github.com"
          always-auth: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false
