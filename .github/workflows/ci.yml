name: Unit Tests

permissions:
  contents: read
  packages: read

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24.x"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        env:
          # Mental model: private @22-2 packages must always be resolved via GitHub Packages.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          registries: |
            https://registry.npmjs.org/
            @22-2:https://npm.pkg.github.com/|$GITHUB_TOKEN

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: bun install

      - name: Run unit tests
        run: bun test

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false
