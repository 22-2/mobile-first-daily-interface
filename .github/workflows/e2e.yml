name: E2E Tests

permissions:
  contents: read
  packages: read

on:
  push: {}
  pull_request: {}
  workflow_dispatch:
    inputs:
      obsidian_version:
        description: "Obsidian release version (e.g. 1.12.4). Use latest for latest release."
        required: false
        default: "latest"

jobs:
  e2e:
    runs-on: ${{ matrix.os }}
    env:
      OBSIDIAN_E2E_TOOLKIT_OBSIDIAN_VERSION: "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.obsidian_version || 'latest' }}"
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Mental model: setup-node's pnpm cache lookup requires pnpm to already exist on PATH.
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"
          scope: "@22-2"
          registry-url: "https://npm.pkg.github.com"
          always-auth: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache plugin downloads
        uses: actions/cache@v4
        with:
          path: myfiles
          key: ${{ runner.os }}-myfiles-${{ hashFiles('tests/plugin-sources.json') }}
          restore-keys: |
            ${{ runner.os }}-myfiles-

      - name: Cache toolkit assets
        uses: actions/cache@v4
        with:
          path: obsidian-e2e-toolkit-assets
          key: "${{ runner.os }}-obsidians-e2e-toolkit-v4-${{ env.OBSIDIAN_E2E_TOOLKIT_OBSIDIAN_VERSION }}"
          restore-keys: |
            ${{ runner.os }}-obsidians-e2e-toolkit-v4-

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: .cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: pnpm install

      - name: Install Playwright chromium (Unix)
        if: matrix.os != 'windows-latest' && steps.playwright-cache.outputs.cache-hit != 'true'
        env:
          PLAYWRIGHT_BROWSERS_PATH: .cache/ms-playwright
        run: pnpx playwright install chromium
        shell: bash

      - name: Install Playwright chromium (Windows)
        if: matrix.os == 'windows-latest' && steps.playwright-cache.outputs.cache-hit != 'true'
        env:
          PLAYWRIGHT_BROWSERS_PATH: .cache/ms-playwright
        run: pnpx playwright install chromium
        shell: pwsh

      - name: Build plugin under test
        run: pnpm run build

      - name: Ensure toolkit Obsidian is installed (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          node "${{ github.workspace }}/node_modules/obsidian-e2e-toolkit/scripts/setup.mjs"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OBSIDIAN_E2E_TOOLKIT_HOME: ${{ github.workspace }}
          OBSIDIAN_E2E_TOOLKIT_OBSIDIAN_VERSION: ${{ env.OBSIDIAN_E2E_TOOLKIT_OBSIDIAN_VERSION }}
        shell: bash

      - name: Ensure toolkit Obsidian is installed (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          node "$env:GITHUB_WORKSPACE\node_modules\obsidian-e2e-toolkit\scripts\setup.mjs"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OBSIDIAN_E2E_TOOLKIT_HOME: ${{ github.workspace }}
          OBSIDIAN_E2E_TOOLKIT_OBSIDIAN_VERSION: ${{ env.OBSIDIAN_E2E_TOOLKIT_OBSIDIAN_VERSION }}
        shell: pwsh

      - name: Run E2E tests
        env:
          CI: true
          PLAYWRIGHT_BROWSERS_PATH: .cache/ms-playwright
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: playwright-report
