name: E2E Tests

permissions:
  contents: read
  packages: read

on:
  push: {}
  pull_request: {}
  workflow_dispatch:
    inputs:
      obsidian_version:
        description: "Obsidian release version (e.g. 1.12.4). Use latest for latest release."
        required: false
        default: "latest"

jobs:
  e2e:
    runs-on: ${{ matrix.os }}
    env:
      OBSIDIAN_E2E_TOOLKIT_OBSIDIAN_VERSION: "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.obsidian_version || 'latest' }}"
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24.x"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        env:
          # Mental model: keep the same private-registry wiring as unit tests to avoid env-specific drift.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          registries: |
            https://registry.npmjs.org/
            @22-2:https://npm.pkg.github.com/|$GITHUB_TOKEN

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache plugin downloads
        uses: actions/cache@v4
        with:
          path: myfiles
          key: ${{ runner.os }}-myfiles-${{ hashFiles('tests/plugin-sources.json') }}
          restore-keys: |
            ${{ runner.os }}-myfiles-

      - name: Cache toolkit assets
        uses: actions/cache@v4
        with:
          path: obsidian-e2e-toolkit-assets
          key: "${{ runner.os }}-obsidians-e2e-toolkit-v4-${{ env.OBSIDIAN_E2E_TOOLKIT_OBSIDIAN_VERSION }}"
          restore-keys: |
            ${{ runner.os }}-obsidians-e2e-toolkit-v4-

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: .cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: bun install

      - name: Install Playwright chromium (Unix)
        if: matrix.os != 'windows-latest' && steps.playwright-cache.outputs.cache-hit != 'true'
        env:
          PLAYWRIGHT_BROWSERS_PATH: .cache/ms-playwright
        run: bunx playwright install chromium
        shell: bash

      - name: Install Playwright chromium (Windows)
        if: matrix.os == 'windows-latest' && steps.playwright-cache.outputs.cache-hit != 'true'
        env:
          PLAYWRIGHT_BROWSERS_PATH: .cache/ms-playwright
        run: bunx playwright install chromium
        shell: pwsh

      - name: Build plugin under test
        run: bun run build

      - name: Ensure toolkit Obsidian is installed (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          node "${{ github.workspace }}/node_modules/obsidian-e2e-toolkit/scripts/setup.mjs"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OBSIDIAN_E2E_TOOLKIT_HOME: ${{ github.workspace }}
          OBSIDIAN_E2E_TOOLKIT_OBSIDIAN_VERSION: ${{ env.OBSIDIAN_E2E_TOOLKIT_OBSIDIAN_VERSION }}
        shell: bash

      - name: Ensure toolkit Obsidian is installed (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          node "$env:GITHUB_WORKSPACE\node_modules\obsidian-e2e-toolkit\scripts\setup.mjs"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OBSIDIAN_E2E_TOOLKIT_HOME: ${{ github.workspace }}
          OBSIDIAN_E2E_TOOLKIT_OBSIDIAN_VERSION: ${{ env.OBSIDIAN_E2E_TOOLKIT_OBSIDIAN_VERSION }}
        shell: pwsh

      - name: Run E2E tests
        env:
          CI: true
          PLAYWRIGHT_BROWSERS_PATH: .cache/ms-playwright
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: playwright-report
